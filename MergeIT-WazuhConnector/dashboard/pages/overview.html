<div class="page overview-page">
  <h2>Overview</h2>

  <div class="stats-grid">
    <div class="stat-card primary">
      <div class="stat-value" id="agentTotal">—</div>
      <div class="stat-label">Total Agents</div>
    </div>
    <div class="stat-card success">
      <div class="stat-value" id="countActive">—</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-card danger">
      <div class="stat-value" id="countDisconnected">—</div>
      <div class="stat-label">Disconnected</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-value" id="countPending">—</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card muted">
      <div class="stat-value" id="countNever">—</div>
      <div class="stat-label">Never Connected</div>
    </div>
  </div>

  <div class="panel-grid">
    <div class="panel">
      <h3>Manager Health</h3>
      <div id="managerStatus"><div class="loading-skel"></div></div>
    </div>
    <div class="panel">
      <h3>Recent Alerts</h3>
      <div id="recentAlerts"><div class="loading-skel"></div></div>
    </div>
  </div>
</div>
